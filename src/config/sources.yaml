sources:
  - name: "arxiv"
    category: "RESEARCH_PAPER"
    enabled: true
    supports_api: true
    url: "http://export.arxiv.org/api/query?search_query=all:ai"
    priority: "HIGH"
    precedence: 100
    extraction_method: "API"
    crawl_frequency_hours: 6
    rate_limit_per_minute: 30
    retry_policy:
      max_retries: 3
      backoff_seconds: 5
    research_target_count: 1100
    batch_size: 250
    max_results_per_request: 250

  - name: "huggingface_papers"
    category: "RESEARCH_PAPER"
    enabled: false
    supports_api: true
    url: "https://huggingface.co/api/daily_papers"
    priority: "MEDIUM"
    precedence: 80
    extraction_method: "RULE_BASED"
    crawl_frequency_hours: 12
    rate_limit_per_minute: 20
    retry_policy:
      max_retries: 3
      backoff_seconds: 10

  - name: "product_hunt"
    category: "PRODUCT"
    enabled: false
    supports_api: false
    url: "https://www.producthunt.com"
